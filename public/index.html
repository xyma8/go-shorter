<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL shorter</title>
  </head>
  <body style="font-size: 2rem; padding: 20px">
    <h1 style="font-size: 3rem">URL shorter</h1>
    <div>
      <b>URL: </b>

      <input
        type="url"
        id="i-url"
        placeholder="Enter URL"
        style="font-size: 1.5rem; width: 100%; padding: 10px"
      />
      <button
        id="b-send"
        style="font-size: 1.5rem; padding: 10px; margin-top: 10px"
      >
        Get Short
      </button>
    </div>
    <br />
    <div>
      <b id="label-short" hidden>Short URL: </b>
      <a id="link-short" href="" style="font-size: 1.5rem"></a>
    </div>

    <script>
      document.getElementById('b-send').onclick = async () => {
        const resultText = document.getElementById('link-short');
        const labelShort = document.getElementById('label-short');
        const inputElement = document.getElementById('i-url');
        const inputValue = inputElement.value;

        if (!inputValue) {
          alert('Enter a URL');
          return;
        }

        try {
          const response = await fetch('/api/get_short', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              original_url: inputValue,
            }),
          });

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const data = await response.json();
          if (data.short_url) {
            labelShort.hidden = false;
            resultText.textContent = data.short_url;
            resultText.href = data.short_url;
          }
        } catch (error) {
          console.log('Error: ', error);
        }
      };
    </script>
  </body>
</html>
